<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FSY ICS Generator</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #17202a;
      background: #f6f8fa;
    }

    body {
      margin: 0;
      padding: 2rem;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
    }

    h1 {
      margin-top: 0;
    }

    label {
      display: block;
      font-weight: 650;
      margin-top: 1rem;
      margin-bottom: 0.35rem;
    }

    select,
    input,
    button {
      font: inherit;
    }

    select,
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 0.65rem;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      background: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .instructions {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
    }

    .instructions p {
      margin-top: 0;
    }

    .instructions ol {
      margin-bottom: 0;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.25rem;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      background: #0969da;
      color: white;
      font-weight: 650;
    }

    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 8px;
      display: none;
      white-space: pre-wrap;
    }

    .message.ok {
      display: block;
      background: #dafbe1;
      border: 1px solid #4ac26b;
    }

    .message.error {
      display: block;
      background: #ffebe9;
      border: 1px solid #ff8182;
    }

    .hint {
      color: #57606a;
      font-size: 0.92rem;
    }

    code {
      background: #f6f8fa;
      padding: 0.1rem 0.25rem;
      border-radius: 4px;
    }

    @media (max-width: 760px) {
      body {
        padding: 1rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>FSY ICS Generator</h1>

    <div class="instructions">
      <p>Choose a starting date and timezone, then press <strong>Generate ICS</strong>.</p>

      <p><strong>For Google Calendar:</strong></p>
      <ol>
        <li>On the desktop site, press the <strong>+</strong> button next to <strong>Other calendars</strong></li>
        <li>Click <strong>Import</strong></li>
        <li>Select the generated ICS file and click <strong>Import</strong></li>
      </ol>
    </div>

    <div class="grid">
      <div>
        <label for="startDate">Starting date (Sunday)</label>
        <select id="startDate">
          <option value="2026-05-31">Sunday, May 31, 2026</option>
          <option value="2026-06-07">Sunday, June 7, 2026</option>
          <option value="2026-06-14">Sunday, June 14, 2026</option>
          <option value="2026-06-21">Sunday, June 21, 2026</option>
          <option value="2026-06-28">Sunday, June 28, 2026</option>
          <option value="2026-07-05">Sunday, July 5, 2026</option>
          <option value="2026-07-12">Sunday, July 12, 2026</option>
          <option value="2026-07-19">Sunday, July 19, 2026</option>
          <option value="2026-07-26">Sunday, July 26, 2026</option>
          <option value="2026-08-02">Sunday, August 2, 2026</option>
        </select>
        <div class="hint">Day 0 starts on this date.</div>
      </div>

      <div>
        <label for="timezone">Timezone</label>
        <select id="timezone">
          <option value="America/New_York">Eastern — America/New_York</option>
          <option value="America/Chicago">Central — America/Chicago</option>
          <option value="America/Denver" selected>Mountain — America/Denver</option>
          <option value="America/Phoenix">Arizona — America/Phoenix</option>
          <option value="America/Los_Angeles">Pacific — America/Los_Angeles</option>
          <option value="America/Anchorage">Alaska — America/Anchorage</option>
          <option value="America/Adak">Hawaii-Aleutian, Aleutian Islands — America/Adak</option>
          <option value="Pacific/Honolulu">Hawaii — Pacific/Honolulu</option>
          <option value="America/Puerto_Rico">Atlantic / Puerto Rico — America/Puerto Rico</option>
          <option value="Pacific/Guam">Chamorro / Guam — Pacific/Guam</option>
          <option value="Pacific/Pago_Pago">Samoa / American Samoa — Pacific/Pago Pago</option>
        </select>
      </div>

      <div>
        <label for="calendarName">Calendar name</label>
        <input id="calendarName" type="text" value="FSY Calendar" />
      </div>
    </div>

    <div class="actions">
      <button id="generateButton">Generate ICS</button>
    </div>

    <div id="message" class="message"></div>
  </main>

  <script src="fsy_template.js"></script>
  <script src="app.js"></script>
</body>
</html>
